basePath: /v1
definitions:
  brochure.Request:
    properties:
      property_id:
        example: 123e4567-e89b-12d3-a456-426614174000
        type: string
    type: object
host: localhost:4000
info:
  contact:
    email: support@argus.com
    name: API Support
    url: http://github.com/your-repo/argus
  description: RPC Server for Argus - Property Brochure Generation Service
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Argus RPC API
  version: "1.0"
paths:
  /brochure:
    post:
      consumes:
        - application/json
      description: Generates a PDF brochure for a given property ID
      parameters:
        - description: Brochure Request
          in: body
          name: request
          required: true
          schema:
            $ref: "#/definitions/brochure.Request"
      produces:
        - application/json
      responses:
        "200":
          description: PDF Base64 encoded
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Generate property brochure
      tags:
        - brochure
  /health:
    get:
      consumes:
        - application/json
      description: Returns the health status of the service
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check endpoint
      tags:
        - health
swagger: "2.0"
