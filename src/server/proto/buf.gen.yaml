version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: argus-rpc/gen
plugins:
  - remote: buf.build/protocolbuffers/go
    out: ../rpc/gen
    opt: paths=source_relative
  - remote: buf.build/connectrpc/go
    out: ../rpc/gen
    opt: paths=source_relative
  - local: protoc-gen-es
    out: ../tests/gen
    opt: target=ts
  - local: protoc-gen-connect-es
    out: ../tests/gen
    opt: target=ts
